    <!-- Preload da imagem principal do Hero: é o elemento de LCP
         (Largest Contentful Paint) da página. Sem isso, o navegador só
         descobre essa imagem depois de baixar e processar o JavaScript
         React, atrasando o carregamento dela desnecessariamente. -->
    <link rel="preload" as="image" href="/manus-storage/hero_eletricista_8af14beb.jpg" fetchpriority="high" />

    <!-- Fontes carregadas de forma não-bloqueante: preconnect antecipa a
         conexão, e o truque do media="print" + onload evita que o
         carregamento da fonte atrase a primeira renderização da página
         (antes, o <link rel="stylesheet"> padrão bloqueava a
         renderização — era a causa do aviso "Solicitações que
         bloquearam a renderização" no PageSpeed Insights). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
